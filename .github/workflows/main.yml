name: Build

on:
  push:
    paths:
      - '*.yaml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ESPHome
        run: pip install esphome
      - name: Compile
        run: esphome compile shidu.yaml
      - name: Upload entire build directory
        uses: actions/upload-artifact@v4
        with:
          name: build-dir
          path: .esphome/build/
